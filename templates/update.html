<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Expense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body">
                        <h3 class="card-title mb-4 text-center">Update Expense</h3>
                        
                        <form action="/update/{{ expense.id }}" method="POST">
                            <div class="mb-3">
                                <label class="form-label">Expense Title</label>
                                <input type="text" name="title" class="form-control" value="{{ expense.title }}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Amount (Rs.)</label>
                                <input type="number" name="amount" class="form-control" value="{{ expense.amount }}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Category</label>
                                <select name="category" class="form-control" required>
                                    <option value="Food" {% if expense.category == 'Food' %}selected{% endif %}>Food</option>
                                    <option value="Transport" {% if expense.category == 'Transport' %}selected{% endif %}>Transport</option>
                                    <option value="Shopping" {% if expense.category == 'Shopping' %}selected{% endif %}>Shopping</option>
                                    <option value="Bills" {% if expense.category == 'Bills' %}selected{% endif %}>Bills</option>
                                    <option value="Other" {% if expense.category == 'Other' %}selected{% endif %}>Other</option>
                                </select>
                            </div>
                            <div class="d-flex justify-content-between">
                                <a href="/" class="btn btn-dark">Cancel</a>
                                <button type="submit" class="btn btn-dark">Save Changes</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
